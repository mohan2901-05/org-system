spring.application.name=org-backend
spring.datasource.url=jdbc:mysql://localhost:3306/onlinedb
spring.datasource.username=root
spring.datasource.password=12345
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver

spring.jpa.hibernate.ddl-auto=none
spring.jpa.show-sql=true
spring.jpa.open-in-view=false
spring.jpa.database-platform=org.hibernate.dialect.MySQL8Dialect

server.error.include-message=always
server.error.include-stacktrace=always

# OAuth2 Resource Server — validates Google id_tokens via JWKS
spring.security.oauth2.resourceserver.jwt.jwk-set-uri=https://www.googleapis.com/oauth2/v3/certs

# Local JWT (email/password auth) — must be ≥256 bits for HS256
app.jwt.secret=EduFlow$ecret#Key2024!ThisIs256BitSecretKeyForHS256Auth!!OK
app.jwt.expiry-hours=24