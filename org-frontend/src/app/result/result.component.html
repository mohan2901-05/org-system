<div class="result-page">

  <!-- Score card -->
  <div class="score-card">
    <div class="score-ring">
      <svg viewBox="0 0 100 100">
        <circle class="track" cx="50" cy="50" r="42"/>
        <circle class="fill" cx="50" cy="50" r="42"
          [attr.stroke-dashoffset]="264 - (264 * percentage / 100)"/>
      </svg>
      <div class="score-label">
        <span class="pct-num">{{ percentage | number:'1.0-0' }}%</span>
        <span class="pct-sub">{{ result.score }} / {{ result.total }}</span>
      </div>
    </div>

    <div class="grade-badge" [style.background]="gradeColor + '22'" [style.color]="gradeColor"
         [style.border-color]="gradeColor + '55'">
      {{ grade }}
    </div>

    <div class="context" *ngIf="result.chapterName">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5" width="13" height="13">
        <path d="M9 12h6m-6 4h6m2 5H7a2 2 0 01-2-2V5a2 2 0 012-2h5.586a1 1 0 01.707.293l5.414 5.414a1 1 0 01.293.707V19a2 2 0 01-2 2z"/>
      </svg>
      <span>{{ result.chapterName }}</span>
      <span *ngIf="result.subjectName"> · {{ result.subjectName }}</span>
      <span *ngIf="result.className"> · {{ result.className }}</span>
    </div>
  </div>

  <!-- Action buttons -->
  <div class="actions">
    <button class="btn-primary" (click)="goToHistory()">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" width="16" height="16">
        <path d="M3 13.125C3 12.504 3.504 12 4.125 12h2.25c.621 0 1.125.504 1.125 1.125v6.75C7.5 20.496 6.996 21 6.375 21h-2.25A1.125 1.125 0 013 19.875v-6.75zM9.75 8.625c0-.621.504-1.125 1.125-1.125h2.25c.621 0 1.125.504 1.125 1.125v11.25c0 .621-.504 1.125-1.125 1.125h-2.25a1.125 1.125 0 01-1.125-1.125V8.625zM16.5 4.125c0-.621.504-1.125 1.125-1.125h2.25C20.496 3 21 3.504 21 4.125v15.75c0 .621-.504 1.125-1.125 1.125h-2.25a1.125 1.125 0 01-1.125-1.125V4.125z"/>
      </svg>
      My Results
    </button>
    <button class="btn-secondary" (click)="retake()">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" width="16" height="16">
        <path d="M16.023 9.348h4.992v-.001M2.985 19.644v-4.992m0 0h4.992m-4.993 0l3.181 3.183a8.25 8.25 0 0013.803-3.7M4.031 9.865a8.25 8.25 0 0113.803-3.7l3.181 3.182m0-4.991v4.99"/>
      </svg>
      Retake
    </button>
    <button class="btn-ghost" (click)="goHome()">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" width="16" height="16">
        <path d="M2.25 12l8.954-8.955c.44-.439 1.152-.439 1.591 0L21.75 12M4.5 9.75v10.125c0 .621.504 1.125 1.125 1.125H9.75v-4.875c0-.621.504-1.125 1.125-1.125h2.25c.621 0 1.125.504 1.125 1.125V21h4.125c.621 0 1.125-.504 1.125-1.125V9.75M8.25 21h8.25"/>
      </svg>
      Home
    </button>
  </div>

  <!-- Collapsible Q&A breakdown -->
  <div class="breakdown-header" (click)="showDetails = !showDetails">
    <span>Question Breakdown</span>
    <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"
         class="chevron-svg" [class.open]="showDetails">
      <path d="M19.5 8.25l-7.5 7.5-7.5-7.5"/>
    </svg>
  </div>

  <div class="breakdown" *ngIf="showDetails">
    <div class="qa-row" *ngFor="let r of details; let i = index"
         [class.correct]="r.isCorrect" [class.wrong]="!r.isCorrect">
      <div class="qa-num">Q{{ i + 1 }}</div>
      <div class="qa-body">
        <div class="qa-question">{{ r.question }}</div>
        <div class="qa-answers">
          <span class="your-ans" [class.correct]="r.isCorrect" [class.wrong]="!r.isCorrect">
            Your answer: {{ r.userAnswer || 'Not Answered' }}
          </span>
          <span class="correct-ans" *ngIf="!r.isCorrect">
            Correct: {{ r.correctAnswer }}
          </span>
        </div>
      </div>
      <div class="qa-icon">
        <svg *ngIf="r.isCorrect" viewBox="0 0 24 24" fill="none" stroke="#10b981" stroke-width="2" width="20" height="20">
          <path d="M9 12.75L11.25 15 15 9.75M21 12a9 9 0 11-18 0 9 9 0 0118 0z"/>
        </svg>
        <svg *ngIf="!r.isCorrect" viewBox="0 0 24 24" fill="none" stroke="#ef4444" stroke-width="2" width="20" height="20">
          <path d="M9.75 9.75l4.5 4.5m0-4.5l-4.5 4.5M21 12a9 9 0 11-18 0 9 9 0 0118 0z"/>
        </svg>
      </div>
    </div>
  </div>

</div>
