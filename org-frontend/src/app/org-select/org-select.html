<h2>Select Organization</h2>

<select [(ngModel)]="selectedOrg">
  <option value="">-- Select Org --</option>
  <option *ngFor="let org of orgList" [value]="org.pkOrgId || org.pk_org_id">
    {{ org.orgName || org.org_name }}
  </option>
</select>

<br><br>

<button (click)="proceed()">Next</button>
