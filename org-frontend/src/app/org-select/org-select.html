<div class="org-select-wrapper">

  <div class="org-card">
    <div class="card-header">
      <span class="icon">🏫</span>
      <h2>Select Organization</h2>
      <p>Choose your organization to get started</p>
    </div>

    <!-- Loading -->
    <div *ngIf="isLoading" class="state-box loading">
      <div class="spinner"></div>
      <span>Loading organizations...</span>
    </div>

    <!-- Error -->
    <div *ngIf="error && !isLoading" class="state-box error">
      ⚠️ {{ error }}
    </div>

    <!-- Dropdown -->
    <div *ngIf="!isLoading" class="form-group">
      <label for="orgSelect">Organization</label>
      <select
        id="orgSelect"
        [(ngModel)]="selectedOrgId"
        (ngModelChange)="onOrgChange($event)"
        class="org-dropdown"
        [disabled]="orgList.length === 0">
        <option value="">— Select an organization —</option>
        <option *ngFor="let org of orgList" [value]="org.pkOrgId">
          {{ org.orgName }}
        </option>
      </select>
    </div>

    <!-- Proceed button -->
    <button
      class="proceed-btn"
      (click)="proceed()"
      [disabled]="!selectedOrgId || isLoading">
      Continue →
    </button>

  </div>

</div>
