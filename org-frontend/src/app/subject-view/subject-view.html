<div class="page">
  <div class="page-header">
    <button class="back-btn" (click)="goBack()">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" width="16" height="16">
        <path d="M10.5 19.5L3 12m0 0l7.5-7.5M3 12h18"/>
      </svg>
      Back
    </button>
    <div>
      <h1 class="page-title">Select a Subject</h1>
      <p class="page-sub">{{ subjects.length }} subject(s) available</p>
    </div>
  </div>

  <div *ngIf="subjects.length === 0" class="empty-state">
    <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.2" class="empty-svg">
      <path d="M4.26 10.147a60.437 60.437 0 00-.491 6.347A48.627 48.627 0 0112 20.904a48.627 48.627 0 018.232-4.41 60.46 60.46 0 00-.491-6.347m-15.482 0a50.57 50.57 0 00-2.658-.813A59.905 59.905 0 0112 3.493a59.902 59.902 0 0110.399 5.84c-.896.248-1.783.52-2.658.814m-15.482 0A50.697 50.697 0 0112 13.489a50.702 50.702 0 017.74-3.342"/>
    </svg>
    <p>No subjects found for this class.</p>
  </div>

  <div class="card-grid" *ngIf="subjects.length > 0">
    <div class="class-card" *ngFor="let s of subjects; let i = index"
         (click)="selectSubject(s)" [style.animation-delay]="i * 0.05 + 's'">
      <div class="card-icon-wrap">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5" class="card-svg">
          <path d="M9.75 3.104v5.714a2.25 2.25 0 01-.659 1.591L5 14.5M9.75 3.104c-.251.023-.501.05-.75.082m.75-.082a24.301 24.301 0 014.5 0m0 0v5.714c0 .597.237 1.17.659 1.591L19.8 15.3M14.25 3.104c.251.023.501.05.75.082M19.8 15.3l-1.57.393A9.065 9.065 0 0112 15a9.065 9.065 0 00-6.23-.693L5 14.5m14.8.8l1.402 1.402c1 1 .03 2.798-1.338 2.798a14.628 14.628 0 01-5.864 0 2 2 0 01-1.338-2.798L5 14.5"/>
        </svg>
      </div>
      <div class="card-label">{{ s.subjectName || s.subject_name }}</div>
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" class="card-arrow-svg">
        <path d="M13.5 4.5L21 12m0 0l-7.5 7.5M21 12H3"/>
      </svg>
    </div>
  </div>
</div>
